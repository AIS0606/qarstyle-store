<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" width="100%" height="100%" style="background-color: white; font-family: Arial, sans-serif;">
  
  <!-- Outer Border -->
  <rect x="20" y="20" width="860" height="710" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Definitions for Arrowheads -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="700" font-size="20" text-anchor="middle" fill="black">Рис. 2.2. – Принцип работы системы (Сценарий работы клиента)</text>

  <!-- NODES (rectangles) -->
  <g fill="#93C5FD" stroke="none" rx="8" ry="8">
    <rect x="350" y="50" width="200" height="50" /> <!-- Клиент -->
    <rect x="350" y="160" width="200" height="50" /> <!-- Главная / Навигация -->
    <rect x="350" y="270" width="200" height="50" /> <!-- Каталог -->
    <rect x="350" y="380" width="200" height="50" /> <!-- Карточка товара -->
    
    <rect x="150" y="490" width="200" height="50" /> <!-- Избранное -->
    <rect x="550" y="490" width="200" height="50" /> <!-- Корзина -->
    
    <rect x="550" y="600" width="200" height="50" /> <!-- Оформление заказа -->
  </g>

  <!-- NODE TEXT -->
  <g fill="white" font-size="16" text-anchor="middle" font-weight="bold">
    <text x="450" y="81">Пользователь (Клиент)</text>
    <text x="450" y="191">Главная страница</text>
    <text x="450" y="301">Каталог товаров</text>
    <text x="450" y="411">Карточка товара</text>
    
    <text x="250" y="521">Избранное</text>
    <text x="650" y="521">Корзина</text>
    
    <text x="650" y="631">Оформление заказа</text>
  </g>

  <!-- ARROWS AND LABELS -->
  <g stroke="black" stroke-width="1.5" fill="none">
    
    <!-- Client to Main -->
    <line x1="450" y1="100" x2="450" y2="155" marker-end="url(#arrow)" />
    <text x="460" y="135" font-size="14" fill="black" stroke="none" text-anchor="start">Вход на сайт</text>

    <!-- Main to Catalog -->
    <line x1="450" y1="210" x2="450" y2="265" marker-end="url(#arrow)" />
    <text x="460" y="245" font-size="14" fill="black" stroke="none" text-anchor="start">Выбор отдела (Мужской и т.д.)</text>

    <!-- Catalog to Product Card -->
    <line x1="450" y1="320" x2="450" y2="375" marker-end="url(#arrow)" />
    <text x="460" y="355" font-size="14" fill="black" stroke="none" text-anchor="start">Выбор конкретного товара</text>

    <!-- Product Card to Favorites -->
    <path d="M 350 405 Q 250 405 250 485" marker-end="url(#arrow)" />
    <text x="180" y="440" font-size="14" fill="black" stroke="none" text-anchor="middle">Отложить на потом</text>

    <!-- Product Card to Cart -->
    <path d="M 550 405 Q 650 405 650 485" marker-end="url(#arrow)" />
    <text x="730" y="440" font-size="14" fill="black" stroke="none" text-anchor="middle">Выбор размера/цвета</text>

    <!-- Favorites to Cart -->
    <line x1="350" y1="515" x2="545" y2="515" marker-end="url(#arrow)" />
    <text x="450" y="505" font-size="14" fill="black" stroke="none" text-anchor="middle">Перенос в корзину</text>

    <!-- Cart to Checkout -->
    <line x1="650" y1="540" x2="650" y2="595" marker-end="url(#arrow)" />
    <text x="660" y="575" font-size="14" fill="black" stroke="none" text-anchor="start">Оплата и доставка</text>

  </g>

</svg>
