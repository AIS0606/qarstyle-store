<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="100%" height="100%" style="background-color: white; font-family: Arial, sans-serif;">
  
  <!-- Outer Border -->
  <rect x="20" y="20" width="860" height="600" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Definitions for Arrowheads -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
    <marker id="arrow-reverse" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="black" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="660" font-size="20" text-anchor="middle" fill="black">Рис. 2.1. – Принцип работы фреймворка Django на проекте QarStyle</text>

  <!-- NODES (rectangles) -->
  <g fill="#93C5FD" stroke="none" rx="8" ry="8">
    <rect x="70" y="70" width="180" height="45" /> <!-- Браузер -->
    <rect x="400" y="70" width="180" height="45" /> <!-- Сервер -->
    
    <rect x="240" y="230" width="180" height="45" /> <!-- URL -->
    <rect x="560" y="230" width="180" height="45" /> <!-- View -->
    
    <rect x="380" y="390" width="180" height="45" /> <!-- Model -->
    <rect x="620" y="390" width="180" height="45" /> <!-- Template -->
    
    <rect x="380" y="520" width="180" height="45" /> <!-- DB -->
  </g>

  <!-- NODE TEXT -->
  <g fill="white" font-size="16" text-anchor="middle" font-weight="bold">
    <text x="160" y="98">Браузер</text>
    <text x="490" y="98">Сервер</text>
    
    <text x="330" y="258">URL (urls.py)</text>
    <text x="650" y="258">Представление (View)</text>
    
    <text x="470" y="418">Модель (ORM)</text>
    <text x="710" y="418">Шаблон (HTML)</text>
    
    <text x="470" y="548">База данных</text>
  </g>

  <!-- ARROWS AND LABELS -->
  <g stroke="black" stroke-width="1.5" fill="none">
    <!-- Browser to Server (Запрос) -->
    <line x1="250" y1="85" x2="390" y2="85" marker-end="url(#arrow)" />
    <text x="320" y="75" font-size="14" fill="black" stroke="none" text-anchor="middle">Запрос</text>

    <!-- Server to Browser (Ответ - curved) -->
    <path d="M 400 105 Q 320 150 250 105" marker-end="url(#arrow)" />
    <text x="325" y="135" font-size="14" fill="black" stroke="none" text-anchor="middle">Ответ</text>

    <!-- Server to URL (Запрос) -->
    <line x1="450" y1="115" x2="360" y2="220" marker-end="url(#arrow)" />
    <text x="430" y="180" font-size="14" fill="black" stroke="none" text-anchor="middle">Запрос</text>

    <!-- URL to View (Запрос) -->
    <line x1="420" y1="252" x2="550" y2="252" marker-end="url(#arrow)" />
    <text x="485" y="242" font-size="14" fill="black" stroke="none" text-anchor="middle">Запрос</text>

    <!-- View to Server (Ответ) -->
    <line x1="620" y1="230" x2="540" y2="115" marker-end="url(#arrow)" />
    <text x="605" y="170" font-size="14" fill="black" stroke="none" text-anchor="middle">Ответ</text>

    <!-- View to Model (Double Arrow) -->
    <line x1="610" y1="275" x2="510" y2="380" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />

    <!-- Model to DB (Double Arrow) -->
    <line x1="450" y1="435" x2="450" y2="510" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />
    <line x1="490" y1="435" x2="490" y2="510" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />

    <!-- View to Template (Curved) -->
    <path d="M 680 275 Q 640 330 680 390" marker-end="url(#arrow)" />
    
    <!-- Template to View (Curved with HTML text) -->
    <path d="M 740 390 Q 780 330 740 275" marker-end="url(#arrow)" />
    <text x="785" y="340" font-size="14" fill="black" stroke="none" text-anchor="middle">HTML</text>
  </g>

</svg>
