<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f8f8;
            margin: 0;
            padding: 0;
            color: #000000;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }
        .header {
            background-color: #000000;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .content {
            padding: 40px 30px;
            line-height: 1.6;
            font-size: 16px;
        }
        .content p {
            margin-bottom: 20px;
        }
        .button {
            display: inline-block;
            background-color: #000000;
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: 500;
            margin-top: 10px;
        }
        .footer {
            background-color: #f1f1f1;
            padding: 24px 30px;
            text-align: center;
            font-size: 13px;
            color: #666666;
        }
        .footer a {
            color: #000000;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QarStyle</h1>
        </div>
        
        <div class="content">
            {{ message|linebreaks }}
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="https://qarstyle-store.onrender.com" class="button">Перейти в магазин</a>
            </div>
        </div>
        
        <div class="footer">
            <p>Вы получили это письмо, так как подписались на рассылку новостей от QarStyle.</p>
            <p>&copy; 2026 QarStyle. Все права защищены.</p>
        </div>
    </div>
</body>
</html>
