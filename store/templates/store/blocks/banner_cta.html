<section data-block-id="{{ block.id }}" {% if request.GET.preview and not block.is_active %}style="opacity: 0.4; outline: 2px dashed red;"{% endif %} class="promo-banner" {% if block.image_main %}style="background-image: url('{{ block.image_main.url }}');"{% endif %}>
  {% if block.title %}<h2>{{ block.title }}</h2>{% endif %}
  {% if block.subtitle %}<p>{{ block.subtitle }}</p>{% endif %}
  {% if block.button_link %}<a href="{{ block.button_link }}" class="btn-solid">{{ block.button_text }}</a>{% endif %}
</section>
