<section data-block-id="{{ block.id }}" {% if request.GET.preview and not block.is_active %}style="opacity: 0.4; outline: 2px dashed red;"{% endif %} class="hero" {% if block.image_main %}style="background-image: url('{{ block.image_main.url }}');"{% endif %}>
  <div class="hero-content">
    {% if block.subtitle %}<h4>{{ block.subtitle }}</h4>{% endif %}
    {% if block.title %}<h1>{{ block.title }}</h1>{% endif %}
    <div class="hero-links">
      {% if block.button_link %}<a href="{{ block.button_link }}">{{ block.button_text }}</a>{% endif %}
      {% if block.button_link_secondary %}<a href="{{ block.button_link_secondary }}">{{ block.button_text_secondary }}</a>{% endif %}
    </div>
  </div>
</section>
