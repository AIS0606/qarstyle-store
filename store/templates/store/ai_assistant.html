<div id="ai-assistant-container">
    <!-- Floating Action Button -->
    <button id="ai-assistant-fab" aria-label="Открыть ИИ помощника">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        <span class="fab-label">AI Помощник</span>
    </button>

    <!-- Chat Window -->
    <div id="ai-assistant-window" class="hidden">
        <div class="chat-header">
            <div class="header-icon">
                <div class="black-square">
                    <div class="bars"></div>
                    <div class="bars"></div>
                </div>
            </div>
            <button id="close-chat" aria-label="Закрыть чат">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div id="chat-messages">
            <div class="message-wrapper bot">
                <div class="message-time">Только что</div>
                <div class="message">
                    <div class="message-content">
                        Привет! Я ваш персональный помощник QarStyle. Чем могу помочь сегодня?
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <input type="text" id="chat-input" placeholder="Введите сообщение..." autocomplete="off">
            <button id="send-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<style>
    :root {
        --ai-primary: #000000;
        --ai-bg: #ffffff;
        --ai-border: #e5e5e5;
        --ai-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        --ai-text: #1a1a1a;
        --ai-text-muted: #999999;
    }

    #ai-assistant-container {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 10000;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* FAB Styles */
    #ai-assistant-fab {
        background: var(--ai-primary);
        color: white;
        border: none;
        padding: 14px 24px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        box-shadow: var(--ai-shadow);
        transition: all 0.3s ease;
    }

    #ai-assistant-fab:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    /* Chat Window Styles */
    #ai-assistant-window {
        position: absolute;
        bottom: 80px;
        right: 0;
        width: 380px;
        height: 600px;
        background: var(--ai-bg);
        border: 1px solid var(--ai-border);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        box-shadow: var(--ai-shadow);
        transition: all 0.3s ease;
        transform-origin: bottom right;
        overflow: hidden;
    }

    #ai-assistant-window.hidden {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
        pointer-events: none;
    }

    .chat-header {
        padding: 20px 24px 15px;
        background: var(--ai-bg);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--ai-border);
    }

    .black-square {
        width: 36px;
        height: 36px;
        background: black;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
    }

    .black-square .bars {
        width: 4px;
        height: 14px;
        background: white;
    }

    #close-chat {
        background: none;
        border: none;
        color: var(--ai-primary);
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #close-chat svg {
        stroke-width: 1.5;
    }

    /* Messages Area */
    #chat-messages {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
        background: #fff;
    }

    .message-wrapper {
        display: flex;
        flex-direction: column;
        max-width: 90%;
    }

    .message-wrapper.bot {
        align-self: flex-start;
        align-items: flex-start;
    }

    .message-wrapper.user {
        align-self: flex-end;
        align-items: flex-end;
    }

    .message-time {
        font-size: 11px;
        color: var(--ai-text-muted);
        margin-bottom: 6px;
    }

    .message-content {
        font-size: 15px;
        line-height: 1.4;
        color: var(--ai-text);
    }

    .message-wrapper.user .message-content {
        text-align: right;
    }

    .message-wrapper.bot .message-content {
        text-align: left;
    }

    /* Product Card inside Chat */
    .chat-product-card {
        border: 1px solid var(--ai-border);
        border-radius: 4px;
        padding: 12px;
        margin-top: 12px;
        display: flex;
        gap: 16px;
        background: #fff;
        width: 280px;
    }

    .chat-product-image {
        width: 80px;
        height: 80px;
        object-fit: cover;
        background: #f5f5f5;
        flex-shrink: 0;
    }

    .chat-product-info {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        flex: 1;
    }

    .chat-product-title {
        font-size: 14px;
        color: var(--ai-text);
        margin: 0 0 4px 0;
        line-height: 1.3;
    }

    .chat-product-price {
        font-size: 14px;
        font-weight: 500;
        color: var(--ai-text);
        margin: 0 0 8px 0;
    }

    .chat-product-btn {
        background: var(--ai-primary);
        color: white;
        text-decoration: none;
        font-size: 12px;
        padding: 6px 0;
        text-align: center;
        width: 100%;
        display: block;
        transition: background 0.2s;
    }

    .chat-product-btn:hover {
        background: #333;
    }

    /* Input Area */
    .chat-input-container {
        padding: 16px 24px;
        background: white;
        border-top: 1px solid var(--ai-border);
        display: flex;
        gap: 12px;
        align-items: center;
    }

    #chat-input {
        flex: 1;
        border: 1px solid var(--ai-border);
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
    }

    #chat-input:focus {
        border-color: #000;
    }

    #send-btn {
        background: var(--ai-primary);
        color: white;
        border: none;
        width: 42px;
        height: 42px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
    }

    #send-btn:hover {
        background: #333;
    }

    /* Mobile Adaptivity */
    @media (max-width: 480px) {
        #ai-assistant-window {
            width: calc(100vw - 32px);
            right: -16px;
            height: calc(100vh - 100px);
            bottom: 70px;
        }
        #ai-assistant-container {
            bottom: 16px;
            right: 16px;
        }
        .chat-product-card {
            width: 100%;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const fab = document.getElementById('ai-assistant-fab');
        const window = document.getElementById('ai-assistant-window');
        const closeBtn = document.getElementById('close-chat');
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesContainer = document.getElementById('chat-messages');

        // Toggle Chat
        fab.addEventListener('click', () => {
            window.classList.toggle('hidden');
            if (!window.classList.contains('hidden')) {
                input.focus();
            }
        });

        closeBtn.addEventListener('click', () => {
            window.classList.add('hidden');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !window.classList.contains('hidden')) {
                window.classList.add('hidden');
            }
        });

        function formatTime() {
            const now = new Date();
            return now.getHours() + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function addMessage(text, isUser = false, products = []) {
            const timeStr = formatTime();
            
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = `message-wrapper ${isUser ? 'user' : 'bot'}`;
            
            let html = `
                <div class="message-time">${isUser ? timeStr : timeStr}</div>
                <div class="message">
                    <div class="message-content">${text}</div>
            `;

            if (products && products.length > 0) {
                products.forEach(p => {
                    html += `
                    <div class="chat-product-card">
                        <img src="${p.image}" alt="${p.name}" class="chat-product-image">
                        <div class="chat-product-info">
                            <div>
                                <p class="chat-product-title">${p.name}</p>
                                <p class="chat-product-price">${p.price} ₸</p>
                            </div>
                            <a href="/product/${p.id}/" class="chat-product-btn">Перейти</a>
                        </div>
                    </div>
                    `;
                });
            }

            html += `</div>`;
            wrapperDiv.innerHTML = html;
            
            messagesContainer.appendChild(wrapperDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';

            const loadingWrapper = document.createElement('div');
            loadingWrapper.className = 'message-wrapper bot loading';
            loadingWrapper.innerHTML = `
                <div class="message-time">Только что</div>
                <div class="message"><div class="message-content">...</div></div>
            `;
            messagesContainer.appendChild(loadingWrapper);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            fetch('/ai-chat/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ message: text })
            })
            .then(response => response.json())
            .then(data => {
                messagesContainer.removeChild(loadingWrapper);
                if (data.response) {
                    addMessage(data.response, false, data.products || []);
                } else if (data.error) {
                    addMessage("Ошибка: " + data.error);
                }
            })
            .catch(error => {
                messagesContainer.removeChild(loadingWrapper);
                console.error('Error:', error);
                addMessage("Извините, произошла ошибка соединения.");
            });
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    });
</script>
